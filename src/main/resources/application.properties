# ==========================================
# APLICA«√O
# ==========================================

spring.application.name=vida-compartilhada

# ==========================================
# BANCO DE DADOS
# ==========================================

spring.datasource.url=jdbc:postgresql://localhost:5432/vida_compartilhada
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# LOGGING SQL
# ==========================================

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Para verses mais antigas do Hibernate:
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==========================================
# JWT
# ==========================================

jwt.secret=TQzfwQktd8xH82WTFP4DeudWaN2PQoQP
jwt.expiration=86400000

# ==========================================
# SERVIDOR
# ==========================================

server.port=8080

# ==========================================
# JACKSON
# ==========================================

spring.jackson.time-zone=America/Sao_Paulo

# ==========================================
# ERROS
# ==========================================

server.error.include-message=always
server.error.include-binding-errors=always

# ==========================================
# DEVTOOLS (se estiver usando)
# ==========================================

spring.devtools.restart.enabled=true